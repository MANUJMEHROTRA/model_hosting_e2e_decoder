# nginx.conf — Reverse proxy + load balancer for FastAPI replicas
#
# Key concepts demonstrated:
#   upstream   — defines the pool of backend servers
#   least_conn — load-balancing algorithm (send to least busy replica)
#   proxy_pass — forward requests to the upstream pool
#   rate limiting — protect the API from traffic spikes

worker_processes auto;   # one worker per CPU core

events {
    worker_connections 1024;
}

http {
    # ── Logging ───────────────────────────────────────────────────────────
    log_format main '$remote_addr - $request_time_ms ms '
                    '"$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    # ── Rate limiting ─────────────────────────────────────────────────────
    # Zone "api_limit": 10 MB memory, 20 req/sec per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

    # ── Upstream pool (load balancer) ─────────────────────────────────────
    # Docker Compose creates DNS entries: "api" resolves to all 3 replica IPs.
    # NGINX with least_conn distributes requests to the least busy replica.
    upstream summarise_backend {
        least_conn;           # algorithm: route to server with fewest active connections
        # round_robin;        # alternative: rotate through replicas equally
        # ip_hash;            # alternative: sticky sessions (same IP → same replica)

        server api:8080;      # Docker Compose DNS resolves "api" to all replicas
        keepalive 32;         # keep 32 persistent connections to backend
    }

    server {
        listen 80;
        server_name _;

        # ── Timeouts ──────────────────────────────────────────────────────
        proxy_read_timeout  300s;   # model inference can be slow
        proxy_send_timeout  300s;
        proxy_connect_timeout 5s;

        # ── Proxy headers (pass real client info to FastAPI) ──────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── API routes ────────────────────────────────────────────────────
        location /summarise {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://summarise_backend;
        }

        location /health {
            proxy_pass http://summarise_backend;
            access_log off;   # don't log health check noise
        }

        location /ready {
            proxy_pass http://summarise_backend;
            access_log off;
        }

        location /metrics {
            # Only allow Prometheus scraper (internal network) to access metrics
            allow 172.0.0.0/8;   # Docker internal IPs
            deny all;
            proxy_pass http://summarise_backend;
        }

        location /docs {
            proxy_pass http://summarise_backend;
        }

        location / {
            proxy_pass http://summarise_backend;
        }
    }
}
