# prometheus.yml — Prometheus scrape configuration
#
# How Prometheus works:
#   1. Prometheus PULLS metrics from targets (not pushed to it)
#   2. Every scrape_interval, it HTTP GETs /metrics on each target
#   3. Metrics are stored as time-series: {metric_name, labels} → [(timestamp, value)]
#   4. PromQL lets you query these time-series to compute p95, rates, etc.
#
# Metric types:
#   Counter   — only increases (total requests, errors). Use rate() in queries.
#   Gauge     — goes up and down (memory usage, active connections).
#   Histogram — samples + buckets (latency). Use histogram_quantile() for p95.
#   Summary   — pre-computed quantiles on client (less flexible than Histogram).

global:
  scrape_interval:     15s   # pull metrics from every target every 15 seconds
  evaluation_interval: 15s   # evaluate alerting rules every 15 seconds
  scrape_timeout:      10s

# ── Alerting (optional, connect to Alertmanager) ─────────────────────────────
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: [alertmanager:9093]

# ── Alerting rules ────────────────────────────────────────────────────────────
# rule_files:
#   - /etc/prometheus/rules/*.yml

# ── Scrape configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus monitors itself
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  # ── FastAPI summarisation service ─────────────────────────────────────────
  # docker-compose: service name "api" resolves to all 3 replicas
  - job_name: summarisation-api
    scrape_interval: 5s    # more frequent for latency accuracy
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8080       # docker-compose service name
        labels:
          service: summarisation
          env:     production

  # ── Kubernetes pod discovery (for k8s deployment) ─────────────────────────
  # Automatically finds all Pods with prometheus.io/scrape: "true" annotation
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      # Only scrape Pods that have the annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      # Use the port from the annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        target_label: __address__
        regex:         (.+)
        replacement:   $1
      # Use the path from the annotation
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex:         (.+)
      # Add pod namespace as a label
      - source_labels: [__meta_kubernetes_namespace]
        target_label: namespace
      # Add pod name as a label
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: pod
